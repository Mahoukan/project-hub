<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tile Patterns - Full Screen</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #p5-stage {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: black;
    }

    #p5-stage canvas {
      display: block;
    }

    input[type="color"] {
      position: absolute;
      z-index: 20;
      border: 0;
      padding: 0;
      background: transparent;
    }
  </style>
</head>

<body>
  <div id="p5-stage"></div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
