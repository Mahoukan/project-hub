<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lissajous Curves - Fullscreen</title>

  <link rel="stylesheet" href="./style.css" />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .project-stage {
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      background: black;
      border-radius: 0;
    }

    #canvas {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      display: block;
      background: black;
    }
  </style>
</head>

<body>
  <section class="project-stage">
    <canvas id="canvas"></canvas>

    <button
      id="settings-toggle"
      class="settings-toggle"
      type="button"
      aria-expanded="true"
      aria-controls="project-settings"
    >
      Settings
    </button>

    <aside id="project-settings" class="project-settings">
      <div class="settings-header">
        <h2>Settings</h2>
        <button
          id="settings-close"
          class="settings-close"
          type="button"
          aria-label="Close settings"
        >
          ×
        </button>
      </div>

      <div class="settings-scroll">
        <label class="control-group">
          <span class="control-label">Grid Size</span>
          <input id="grid-slider" type="range" min="2" max="25" value="4" />
          <span id="grid-value" class="control-value">4</span>
        </label>

        <label class="control-group">
          <span class="control-label">Draw Speed</span>
          <input id="speed-slider" type="range" min="1" max="200" value="50" />
          <span id="speed-value" class="control-value">50</span>
        </label>

        <label class="control-group">
          <span class="control-label">Pause After Draw</span>
          <input id="pause-slider" type="range" min="0" max="120" value="25" />
          <span id="pause-value" class="control-value">25</span>
        </label>

        <label class="control-group">
          <span class="control-label">Fade Length</span>
          <input id="fade-slider" type="range" min="0" max="120" value="15" />
          <span id="fade-value" class="control-value">15</span>
        </label>

        <label class="control-group">
          <span class="control-label">Tip Length</span>
          <input id="tip-slider" type="range" min="4" max="80" value="10" />
          <span id="tip-value" class="control-value">10</span>
        </label>

        <label class="control-group">
          <span class="control-label">Guide Opacity</span>
          <input id="guide-slider" type="range" min="0" max="25" value="8" />
          <span id="guide-value" class="control-value">8</span>
        </label>
      </div>
    </aside>
  </section>

  <script src="../../js/project-boot.js"></script>
  <script src="./script.js"></script>
</body>
</html>
