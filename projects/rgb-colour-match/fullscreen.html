<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RGB Colour Match - Fullscreen</title>

    <link rel="stylesheet" href="./style.css" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #e8ebef;
      }

      .project-stage {
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-rows: 1fr auto;
        overflow: hidden;
      }

      .canvas-wrap {
        min-height: 0;
        height: auto;
      }

      #canvas {
        width: 100%;
        height: 100%;
        min-height: 0;
        display: block;
      }

      .game-controls {
        max-height: 42vh;
        overflow-y: auto;
        flex-shrink: 0;
      }

      .controls-grid {
        padding: 12px;
        gap: 12px;
      }

      @media (max-height: 700px) {
        .game-controls {
          max-height: 50vh;
        }

        .controls-grid {
          grid-template-columns: 1fr 1fr;
          padding: 10px;
          gap: 10px;
        }

        .control-group--buttons {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>

  <body>
    <section class="project-stage project-stage--stacked">
      <div class="canvas-wrap">
        <canvas id="canvas"></canvas>
      </div>

      <section class="game-controls">
        <div class="controls-grid">
          <div class="control-group">
            <div class="control-header">
              <label class="control-label">Red</label>
              <span id="value-r" class="control-value">127</span>
            </div>
            <input id="slider-r" type="range" min="0" max="255" value="127" />
          </div>

          <div class="control-group">
            <div class="control-header">
              <label class="control-label">Green</label>
              <span id="value-g" class="control-value">127</span>
            </div>
            <input id="slider-g" type="range" min="0" max="255" value="127" />
          </div>

          <div class="control-group">
            <div class="control-header">
              <label class="control-label">Blue</label>
              <span id="value-b" class="control-value">127</span>
            </div>
            <input id="slider-b" type="range" min="0" max="255" value="127" />
          </div>

          <div class="control-group">
            <label class="control-label">Difficulty</label>
            <select id="difficulty">
              <option value="3600">Easy (60s)</option>
              <option value="1800" selected>Normal (30s)</option>
              <option value="900">Hard (15s)</option>
            </select>
          </div>

          <div class="control-group control-group--buttons">
            <button id="btn-done" class="action-btn">Done</button>
            <button id="btn-reset" class="action-btn secondary">Reset</button>
          </div>
        </div>
      </section>
    </section>

    <script src="../../js/project-boot.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
