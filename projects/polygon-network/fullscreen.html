<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polygon Network - Full Screen</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #project-stage {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: black;
      touch-action: none;
    }

    #polygon-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: black;
      cursor: crosshair;
    }
  </style>
</head>

<body>
  <section id="project-stage">
    <canvas id="polygon-canvas"></canvas>
  </section>

  <script src="./script.js"></script>
</body>
</html>
