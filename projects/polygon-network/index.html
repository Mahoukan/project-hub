<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >

    <link rel="stylesheet" href="../../css/project-layout.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-project-slug="polygon-network">
    <div class="project-shell">
      <header class="project-header">
        <a class="back-link" href="../../index.html">← Back to Hub</a>

        <div class="project-meta">
          <h1 id="project-title">Loading...</h1>
          <p id="project-description">Loading project description...</p>
        </div>
      </header>

      <main class="project-main">
        <section class="project-stage" id="project-stage">
          <canvas id="polygon-canvas"></canvas>

          <!-- optional overlay / fallback title target -->
          <div class="project-overlay-title" id="overlay-title" hidden></div>
        </section>

        <aside class="project-sidebar">
          <div class="sidebar-block">
            <h2>About</h2>
            <p id="project-long-description">Loading project details...</p>
          </div>

          <div class="sidebar-block">
            <h2>Status</h2>
            <p id="project-status">Loading...</p>
          </div>

          <div class="sidebar-block">
            <h2>Controls</h2>
            <ul id="project-controls">
              <li>Loading controls...</li>
            </ul>
          </div>

          <div class="sidebar-block">
            <h2>Notes</h2>
            <ul id="project-notes">
              <li>Loading notes...</li>
            </ul>
          </div>

          <div class="sidebar-block">
            <h2>Tags</h2>
            <div class="sidebar-tags" id="project-tags"></div>
          </div>
        </aside>
      </main>
    </div>

    <script src="../../js/project-page.js"></script>
    <script src="../../js/project-boot.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
